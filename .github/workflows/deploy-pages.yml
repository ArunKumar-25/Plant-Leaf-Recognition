name: Deploy web/ to GitHub Pages

on:
  push:
    branches: ["main"]
    paths: ["web/**", ".github/workflows/deploy-pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure API endpoint
        env:
          PLANTIFY_API_BASE: ${{ vars.PLANTIFY_API_BASE }}
        run: |
          echo "DEBUG: resolved value length = ${#PLANTIFY_API_BASE}" > web/debug-var.txt
          echo "DEBUG: resolved value = [$PLANTIFY_API_BASE]" >> web/debug-var.txt
          if [ -n "$PLANTIFY_API_BASE" ]; then
            printf '(function () {\n    "use strict";\n\n    window.PLANTIFY_API_BASE = "%s";\n})();\n' "$PLANTIFY_API_BASE" > web/js/config.js
          fi
      - name: Upload web/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
