name: Keep API warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /health
        env:
          PLANTIFY_API_BASE: ${{ vars.PLANTIFY_API_BASE }}
        run: |
          if [ -z "$PLANTIFY_API_BASE" ]; then
            echo "PLANTIFY_API_BASE repo variable is not set -- nothing to ping, skipping."
            exit 0
          fi
          curl -sf --max-time 30 "$PLANTIFY_API_BASE/health" \
            && echo "API responded, still warm." \
            || echo "Ping failed -- host may be cold-starting or down."
