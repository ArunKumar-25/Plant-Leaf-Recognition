name: Dependabot auto-merge

# Auto-merges Dependabot PRs for patch/minor bumps once CI passes -- major
# version bumps are left for manual review (that's where real breakage risk
# lives, e.g. the numpy 2.x / tensorflow-cpu incompatibility). Requires
# "Allow auto-merge" enabled in repo Settings -> General (one-time, manual --
# not settable from a workflow file).

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for patch/minor updates
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
