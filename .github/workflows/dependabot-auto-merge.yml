name: Dependabot auto-merge

# Auto-merges Dependabot PRs for patch/minor bumps once CI passes -- major
# version bumps are left for manual review (that's where real breakage risk
# lives, e.g. the numpy 2.x / tensorflow-cpu incompatibility). Requires
# "Allow auto-merge" enabled in repo Settings -> General (one-time, manual --
# not settable from a workflow file).

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      # github-actions bumps are runner-action versions, not a semver API
      # contract -- a "major" actions/checkout bump essentially never breaks
      # actual usage, so always merge those. pip majors are real breakage
      # risk (see the numpy 2.x incident), so skip those for manual review.
      # GitHub can briefly report a fresh/updated PR as "unstable" while it
      # finishes computing mergeability -- retry instead of failing outright.
      - name: Enable auto-merge
        if: |
          steps.metadata.outputs.package-ecosystem == 'github_actions' ||
          steps.metadata.outputs.update-type != 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          for attempt in 1 2 3 4 5; do
            if gh pr merge --auto --squash "$PR_URL"; then
              exit 0
            fi
            echo "Attempt $attempt failed (likely still computing mergeability) -- retrying in 15s..."
            sleep 15
          done
          echo "Failed to enable auto-merge after 5 attempts."
          exit 1
