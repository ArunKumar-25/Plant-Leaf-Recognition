version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # One PR for all minor/patch bumps instead of one per package. Major
      # bumps stay ungrouped (individual PRs) since they're the ones likely
      # to actually break something.
      pip-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # numpy 2.x breaks tensorflow-cpu==2.15.0 (needs numpy<2.0) -- confirmed
      # via the numpy-2.2.6 PR failing to resolve. Only bump numpy alongside
      # a deliberate tensorflow-cpu upgrade, not automatically.
      - dependency-name: "numpy"
        update-types: ["version-update:semver-major"]
      # opencv-python-headless >4.9.0.80 requires numpy>=2, same conflict as
      # above, but arrives as a "minor" bump under its own versioning (4.9 ->
      # 4.13) so the numpy ignore rule doesn't catch it. Confirmed twice --
      # this exact combination broke main via the pip-minor-patch group.
      - dependency-name: "opencv-python-headless"
      # tensorflow-cpu 2.15->2.21 (classified "minor") pulls in Keras 3,
      # which flatly refuses to load the committed artifacts/model/ (legacy
      # SavedModel format) -- confirmed by actually loading the model under
      # both versions. Requires a deliberate re-save/migration, not an
      # automatic bump.
      - dependency-name: "tensorflow-cpu"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]
